[font]
size = 18.0

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.bold_italic]
family = "monospace"
style = "Bold Italic"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.offset]
x = 0
y = 0

[scrolling]
history = 10000
multiplier = 3

[shell]
program = "/usr/bin/zsh"

[window]
decorations = "full"
dynamic_title = true
opacity = 1.0
startup_mode = "Fullscreen"
title = "Alacritty"
